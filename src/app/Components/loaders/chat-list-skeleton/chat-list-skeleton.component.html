<div class="skeleton-panel" role="status" aria-label="Cargando conversaciones...">
  <div class="panel-header">
    <div class="title-row">
      <div class="skel skel-text" style="width: 80px; height: 16px;"></div>
      <div style="display: flex; gap: 8px;">
        <div class="skel skel-rect" style="width: 28px; height: 28px;"></div>
        <div class="skel skel-rect" style="width: 22px; height: 22px;"></div>
      </div>
    </div>

    <div class="skel search-skel"></div>

    <div class="tabs-row">
      <div class="skel tab-skel" style="width: 58px;"></div>
      <div class="skel tab-skel" style="width: 54px;"></div>
      <div class="skel tab-skel" style="width: 72px;"></div>
      <div class="skel tab-skel" style="width: 60px;"></div>
    </div>
  </div>

  <div class="chat-list">
    <div
      class="chat-item"
      *ngFor="let i of items"
      [style.animation-delay]="(i * 0.05) + 's'"
    >
      <div class="avatar-wrap">
        <div class="skel skel-circle avatar"></div>
        <div class="skel badge-dot" *ngIf="i % 3 === 0"></div>
      </div>

      <div class="item-body">
        <div class="item-top">
          <div style="display: flex; align-items: center; gap: 6px;">
            <div
              class="skel skel-text"
              [style.width]="(80 + (i % 4) * 20) + 'px'"
              style="height: 13px;"
            ></div>
            <div
              class="skel tab-skel"
              style="width: 38px; height: 11px;"
              *ngIf="i % 4 === 2"
            ></div>
          </div>
          <div class="skel skel-text" style="width: 32px; height: 11px;"></div>
        </div>

        <div class="item-bottom">
          <div
            class="skel skel-text"
            [style.width]="(130 + (i % 3) * 25) + 'px'"
            style="height: 11px;"
          ></div>
          <div
            class="skel skel-circle"
            style="width: 18px; height: 18px;"
            *ngIf="i % 3 === 0"
          ></div>
        </div>
      </div>
    </div>
  </div>
</div>
