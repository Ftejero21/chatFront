<div class="poll-composer">
  <div class="poll-composer__header">
    <h3>Crea una encuesta</h3>
    <button
      type="button"
      class="poll-composer__close"
      aria-label="Cerrar creador de encuesta"
      title="Cerrar"
      (click)="onClose()"
    >
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="poll-composer__body">
    <section class="poll-block">
      <label class="poll-block__label">Pregunta</label>
      <div class="poll-input-line-wrap poll-emoji-anchor">
        <input
          type="text"
          [(ngModel)]="pregunta"
          placeholder="Haz una pregunta"
          maxlength="160"
          class="poll-input-line poll-input-line--question"
        />
        <button
          type="button"
          class="poll-emoji-btn"
          aria-label="Abrir emojis para pregunta"
          (click)="toggleEmojiForQuestion($event)"
        >
          <i class="bi bi-emoji-smile"></i>
        </button>
        <app-emoji-picker
          *ngIf="isEmojiOpenForQuestion()"
          class="poll-emoji-pop poll-emoji-pop--question"
          (emojiSelect)="onEmojiSelected($event)"
        ></app-emoji-picker>
      </div>
    </section>

    <section class="poll-block">
      <label class="poll-block__label">Opciones</label>
      <div class="poll-options">
        <div
          *ngFor="let option of opciones; trackBy: trackOption"
          class="poll-option-row"
          [class.dragging]="draggingOptionId === option.id"
          draggable="true"
          (dragstart)="onOptionDragStart(option, $event)"
          (dragover)="onOptionDragOver(option, $event)"
          (dragend)="onOptionDragEnd()"
        >
          <div class="poll-input-line-wrap poll-input-line-wrap--option poll-emoji-anchor">
            <input
              type="text"
              [(ngModel)]="option.text"
              (ngModelChange)="onOptionInput()"
              placeholder="Anade texto"
              maxlength="90"
              class="poll-input-line"
            />
            <button
              type="button"
              class="poll-emoji-btn poll-emoji-btn--option"
              aria-label="Abrir emojis para opcion"
              (click)="toggleEmojiForOption(option.id, $event)"
            >
              <i class="bi bi-emoji-smile"></i>
            </button>
            <app-emoji-picker
              *ngIf="isEmojiOpenForOption(option.id)"
              class="poll-emoji-pop poll-emoji-pop--option"
              (emojiSelect)="onEmojiSelected($event)"
            ></app-emoji-picker>
          </div>
          <button
            type="button"
            class="poll-option-remove"
            title="Quitar opcion"
            aria-label="Quitar opcion"
            (click)="removeOption(option.id)"
          >
            <i class="bi bi-trash3"></i>
          </button>
          <span class="poll-drag-handle" title="Arrastra para reordenar">
            <i class="bi bi-list"></i>
          </span>
        </div>
      </div>
    </section>

    <section class="poll-switch-row">
      <span>Permitir varias respuestas</span>
      <label class="poll-switch">
        <input type="checkbox" [(ngModel)]="permitirMultiples" />
        <span class="poll-slider"></span>
      </label>
    </section>
  </div>

  <button
    type="button"
    class="poll-send-btn"
    [disabled]="!canSubmit"
    title="Crear encuesta"
    aria-label="Crear encuesta"
    (click)="submit()"
  >
    <i class="bi bi-send-fill"></i>
  </button>
</div>
