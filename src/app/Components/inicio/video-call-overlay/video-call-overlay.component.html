<div class="call-overlay" role="dialog" aria-modal="true" aria-label="Videollamada en curso">
  <div class="main-container">
    <div class="ambient-bg" aria-hidden="true">
      <div class="bg-blur bg-blur-top"></div>
      <div class="bg-blur bg-blur-bottom"></div>
    </div>

    <video
      *ngIf="hasRemoteVideoActive"
      class="remote-video"
      [appMediaStream]="remoteStream"
      autoplay
      playsinline
    ></video>

    <div *ngIf="!hasRemoteVideoActive" class="caller-info" [ngClass]="callStatusClass || ''">
      <div class="avatar-glow">
        <img *ngIf="peerAvatarUrl; else remoteIcon" [src]="peerAvatarUrl" alt="Avatar contacto" class="avatar-img" />
        <ng-template #remoteIcon>
          <i class="bi bi-person-fill avatar-icon" aria-hidden="true"></i>
        </ng-template>
      </div>
      <h1 class="peer-name">{{ peerDisplayName }}</h1>
      <p class="call-type">Llamada de voz y vídeo</p>
      <div class="status-badge" [ngClass]="callStatusClass || 'is-ringing'">
        <span class="dot-blink"></span>
        <span>{{ statusMessage }}</span>
      </div>
    </div>

    <div class="self-video">
      <video class="self-video-stream" [appMediaStream]="localStream" autoplay playsinline muted></video>
      <div *ngIf="showLocalVideoOffState" class="self-video-off">
        <i class="bi bi-camera-video-off-fill" aria-hidden="true"></i>
        <p>Cámara desactivada</p>
      </div>
      <div class="self-label">Tu</div>
    </div>

    <div class="controls-bar">
      <button
        class="btn-control"
        type="button"
        [class.active]="!isMuted"
        [attr.aria-pressed]="isMuted"
        aria-label="Alternar microfono"
        title="Microfono"
        (click)="toggleMuteClick.emit()"
      >
        <i class="bi" [ngClass]="isMuted ? 'bi-mic-mute-fill' : 'bi-mic-fill'"></i>
      </button>

      <button
        class="btn-control"
        type="button"
        [class.active]="!camOff"
        [attr.aria-pressed]="camOff"
        aria-label="Alternar camara"
        title="Camara"
        (click)="toggleCamClick.emit()"
      >
        <i class="bi" [ngClass]="camOff ? 'bi-camera-video-off-fill' : 'bi-camera-video-fill'"></i>
      </button>

      <button class="btn-control" type="button" aria-label="Compartir pantalla" title="Compartir pantalla">
        <i class="bi bi-display"></i>
      </button>

      <button class="btn-control" type="button" aria-label="Chat" title="Chat">
        <i class="bi bi-chat-dots-fill"></i>
      </button>

      <button
        class="btn-control btn-hangup"
        type="button"
        aria-label="Colgar llamada"
        title="Finalizar llamada"
        (click)="hangClick.emit()"
      >
        <i class="bi bi-telephone-x-fill"></i>
      </button>
    </div>
  </div>
</div>
